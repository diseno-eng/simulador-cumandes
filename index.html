<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Simulador Cumandes ISF</title>
    <!-- Tailwind CSS para los estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React y ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel actualizado para procesar el código y evitar errores de caché -->
    <script src="https://unpkg.com/@babel/standalone@7.24.0/babel.min.js"></script>
    
    <style>
        body { margin: 0; background-color: #0a0a0a; touch-action: manipulation; user-select: none; -webkit-user-select: none; }
        /* Ocultar barras de desplazamiento para estética de pantalla táctil */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect, useRef } = React;

        // --- Íconos en formato SVG ---
        const IconSettings = ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>;
        const IconBattery = ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="16" height="10" x="2" y="7" rx="2" ry="2"></rect><line x1="22" x2="22" y1="11" y2="13"></line></svg>;
        const IconDroplet = ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5C6 11.1 5 13 5 15a7 7 0 0 0 7 7z"></path></svg>;
        const IconActivity = ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>;
        const IconWrench = ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path></svg>;
        const IconThermometer = ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"></path></svg>;
        const IconKeyRound = ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2.586 17.414A2 2 0 0 0 2 18.828V21a1 1 0 0 0 1 1h3a1 1 0 0 0 1-1v-1a1 1 0 0 1 1-1h1a1 1 0 0 0 1-1v-1a1 1 0 0 1 1-1h.172a2 2 0 0 0 1.414-.586l.814-.814a6.5 6.5 0 1 0-4-4z"></path><circle cx="16.5" cy="7.5" r=".5" fill="currentColor"></circle></svg>;
        const IconPower = ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18.36 6.64a9 9 0 1 1-12.73 0"></path><line x1="12" x2="12" y1="2" y2="12"></line></svg>;
        const IconCheckCircle2 = ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><path d="m9 12 2 2 4-4"></path></svg>;
        const IconAlertTriangle = ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"></path><path d="M12 9v4"></path><path d="M12 17h.01"></path></svg>;
        const IconRefreshCcw = ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"></path><path d="M16 21v-5h5"></path></svg>;
        const IconDices = ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"></rect><path d="M8 8h.01"></path><path d="M16 8h.01"></path><path d="M8 16h.01"></path><path d="M16 16h.01"></path><path d="M12 12h.01"></path></svg>;
        const IconX = ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
        const IconCheck = ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"></polyline></svg>;

        // --- URLs DE AUDIOS ---
        const AUDIO_URLS = {
            crank: 'https://cdn.pixabay.com/audio/2022/03/10/audio_c3c3a9f0ee.mp3', // Motor arrancando
            run: 'https://cdn.pixabay.com/audio/2022/01/18/audio_6a30704d9c.mp3', // Motor diésel en ralentí
            fail: 'https://cdn.pixabay.com/audio/2023/10/16/audio_24e23733e8.mp3'  // Motor apagándose o fallando
        };

        // --- CÓDIGOS GANADORES SEPARADOS POR DÍA ---
        const WINNING_CODES_BY_DAY = {
            0: ['991', '992', '993', '994', '995'], // Día 0: Demo y Capacitación
            1: ['125', '482', '709', '331', '954'],
            2: ['246', '518', '893', '072', '667'],
            3: ['039', '314', '685', '920', '471']
        };

        function SimuladorApp() {
            const [code, setCode] = useState('');
            const [status, setStatus] = useState('idle'); // idle, cranking, success, fail, already_used
            
            const [rpm, setRpm] = useState(0);
            const [temp, setTemp] = useState(0); 
            const [oil, setOil] = useState(0);   

            // Estados de Control
            const [activeDay, setActiveDay] = useState(0); // Arranca en Día 0 (Demo) por defecto
            const [usedCodes, setUsedCodes] = useState([]);
            const [clickCount, setClickCount] = useState(0); 
            const [showModal, setShowModal] = useState(false);
            const [showAdminPanel, setShowAdminPanel] = useState(false);

            // Referencias a los elementos de audio
            const audioCrankRef = useRef(null);
            const audioRunRef = useRef(null);
            const audioFailRef = useRef(null);

            // Inicializar audios
            useEffect(() => {
                audioCrankRef.current = new Audio(AUDIO_URLS.crank);
                audioRunRef.current = new Audio(AUDIO_URLS.run);
                audioFailRef.current = new Audio(AUDIO_URLS.fail);
                
                if(audioRunRef.current) audioRunRef.current.loop = true;

                return () => {
                    if(audioCrankRef.current) audioCrankRef.current.pause();
                    if(audioRunRef.current) audioRunRef.current.pause();
                    if(audioFailRef.current) audioFailRef.current.pause();
                }
            }, []);

            const playAudio = (audioRef) => {
                if (audioRef.current) {
                    audioRef.current.currentTime = 0;
                    audioRef.current.play().catch(err => console.log("Autoplay bloqueado (requiere interacción del usuario)", err));
                }
            };

            const stopAllAudio = () => {
                if (audioCrankRef.current) { audioCrankRef.current.pause(); audioCrankRef.current.currentTime = 0; }
                if (audioRunRef.current) { audioRunRef.current.pause(); audioRunRef.current.currentTime = 0; }
                if (audioFailRef.current) { audioFailRef.current.pause(); audioFailRef.current.currentTime = 0; }
            };

            useEffect(() => {
                let rpmInterval;
                let gaugeTimeout;

                if (status === 'cranking') {
                    stopAllAudio();
                    playAudio(audioCrankRef);

                    setTemp(100);
                    setOil(100);
                    setRpm(4000);

                    gaugeTimeout = setTimeout(() => {
                        rpmInterval = setInterval(() => {
                            setRpm(Math.floor(Math.random() * 1500) + 1000);
                            setTemp(40 + Math.random() * 5); 
                            setOil(70 + Math.random() * 10); 
                        }, 150);
                    }, 600); 

                    // Después de 3.5 segundos decidimos si enciende o no
                    setTimeout(() => {
                        clearInterval(rpmInterval);
                        const upperCode = code.toUpperCase();
                        
                        // --- CÓDIGOS DE PRUEBA (TRAINING TEAM) ---
                        if (upperCode === '1111') {
                            setRpm(0);     
                            setTemp(0);
                            setOil(0);
                            stopAllAudio();
                            playAudio(audioFailRef);
                            setStatus('fail');
                            setShowModal(true);
                            return;
                        }
                        
                        if (upperCode === '2222') {
                            setRpm(800);   
                            setTemp(50);   
                            setOil(60);    
                            stopAllAudio();
                            playAudio(audioRunRef);
                            setStatus('success');
                            setShowModal(true);
                            // No se guarda en usedCodes para poder repetir la prueba
                            return;
                        }

                        if (upperCode === '3333') {
                            setRpm(0);     
                            setTemp(0);
                            setOil(0);
                            stopAllAudio();
                            playAudio(audioFailRef);
                            setStatus('already_used'); 
                            setShowModal(true);
                            return;
                        }

                        // --- LÓGICA REAL (EVENTO) ---
                        // Validar solo contra los códigos del día activo
                        const currentWinningCodes = WINNING_CODES_BY_DAY[activeDay];
                        
                        if (currentWinningCodes.includes(upperCode)) {
                            // Revisamos nuestro array local de códigos usados
                            if (usedCodes.includes(upperCode)) {
                                setRpm(0);     
                                setTemp(0);
                                setOil(0);
                                stopAllAudio();
                                playAudio(audioFailRef);
                                setStatus('already_used'); 
                                setShowModal(true);
                            } else {
                                setRpm(800);   // Ralentí
                                setTemp(50);   // Temperatura normal
                                setOil(60);    // Presión normal
                                stopAllAudio();
                                playAudio(audioRunRef);
                                setStatus('success');
                                setShowModal(true);
                                
                                // Guardamos el código como utilizado LOCALMENTE en esta sesión
                                setUsedCodes(prev => [...prev, upperCode]);
                            }
                        } else {
                            setRpm(0);     // Se apaga
                            setTemp(0);
                            setOil(0);
                            stopAllAudio();
                            playAudio(audioFailRef);
                            setStatus('fail');
                            setShowModal(true);
                        }
                    }, 3500);
                }

                return () => {
                    clearInterval(rpmInterval);
                    clearTimeout(gaugeTimeout);
                };
            }, [status, code, activeDay]); // activeDay en dependencias

            // Función para deshabilitar las teclas si pasa de 3 dígitos (a menos que sea un código de prueba)
            const isNumDisabled = (numStr) => {
                if (status !== 'idle') return true;
                if (code.length < 3) return false;
                if (code.length === 3) {
                    return !['1111', '2222', '3333'].includes(code + numStr);
                }
                return true; // Bloquea si ya tiene 4 dígitos
            };

            const handleKeypadPress = (num) => {
                if (status !== 'idle') return;
                const newCode = code + num;
                
                // Solo permite agregar si es de 3 cifras o menos, o si forma exactamente un código de prueba
                if (newCode.length <= 3 || ['1111', '2222', '3333'].includes(newCode)) {
                    setCode(newCode);
                }
            };

            const handleDelete = () => {
                if (status === 'idle') {
                    setCode(prev => prev.slice(0, -1));
                }
            };

            const handleRandomCode = () => {
                if (status === 'idle') {
                    const randomNum = Math.floor(Math.random() * 1000).toString().padStart(3, '0');
                    setCode(randomNum);
                }
            };

            const handleStart = () => {
                if (code.length === 3 || code.length === 4) {
                    setStatus('cranking');
                } else if (code.length > 0 && code.length < 3) {
                     alert("Por favor ingresa un código de 3 cifras");
                }
            };

            const handleNextParticipant = () => {
                setShowModal(false);
                setStatus('idle');
                setCode('');
                setRpm(0);
                setTemp(0);
                setOil(0);
                stopAllAudio();
            };

            const handleReset = () => {
                setStatus('idle');
                setCode('');
                setRpm(0);
                setTemp(0);
                setOil(0);
                setShowModal(false);
                stopAllAudio();
            };

            const rpmRotation = Math.min((rpm / 5000) * 180, 180) - 90;
            const tempRotation = Math.min((temp / 100) * 180, 180) - 90;
            const oilRotation = Math.min((oil / 100) * 180, 180) - 90;

            const MiniGauge = ({ value, rotation, icon: Icon, label, color }) => (
                <div className="relative w-24 h-24 sm:w-28 sm:h-28 flex flex-col items-center justify-end overflow-hidden pb-2">
                    <div className="absolute top-0 w-full h-full rounded-full border-8 border-neutral-800 shadow-[inset_0_0_10px_rgba(0,0,0,1)]"></div>
                    <div className="absolute top-2 w-[calc(100%-16px)] h-[calc(100%-16px)] rounded-full border-4 border-neutral-700/50 border-b-transparent"></div>
                    <Icon className={`absolute top-6 w-5 h-5 ${color} opacity-50`} />
                    <div 
                        className="absolute bottom-[20px] left-1/2 w-1 h-10 sm:h-12 bg-red-600 origin-bottom shadow-[0_0_5px_rgba(220,38,38,0.5)] transition-transform duration-500 ease-out rounded-t-full z-10"
                        style={{ transform: `translateX(-50%) rotate(${rotation}deg)` }}
                    >
                        <div className="absolute bottom-[-4px] left-1/2 -translate-x-1/2 w-3 h-3 bg-neutral-900 border-2 border-neutral-500 rounded-full"></div>
                    </div>
                    <span className="text-[9px] sm:text-[10px] font-mono font-bold text-neutral-400 mt-auto z-0">{label}</span>
                </div>
            );

            // Componente del Modal de Resultados (Juego)
            const ResultModal = ({ type, onClose }) => {
                const config = {
                    fail: {
                        color: 'red',
                        borderColor: 'border-red-600',
                        iconColor: 'text-red-500',
                        glow: 'shadow-[0_0_30px_rgba(220,38,38,0.4)]',
                        icon: <IconX className="w-8 h-8 sm:w-10 sm:h-10" />,
                        title: 'INTENTO FALLIDO',
                        subtitle: 'El código ingresado no activó la ignición.',
                        body: 'No te preocupes, ¡sigue disfrutando de nuestro stand en Expopartes 2026 y conoce más sobre la potencia Cummins!',
                        btnClass: 'bg-red-600 hover:bg-red-700 shadow-[0_4px_15px_rgba(220,38,38,0.4)]'
                    },
                    success: {
                        color: 'green',
                        borderColor: 'border-green-500',
                        iconColor: 'text-green-500',
                        glow: 'shadow-[0_0_30px_rgba(34,197,94,0.4)]',
                        icon: <IconCheck className="w-8 h-8 sm:w-10 sm:h-10" />,
                        title: '¡MOTOR ENCENDIDO!',
                        subtitle: 'El código ha activado la ignición exitosamente.',
                        body: '¡Felicidades, eres un ganador! Acércate a uno de nuestros asesores para reclamar tu obsequio o beneficio exclusivo.',
                        btnClass: 'bg-green-600 hover:bg-green-700 shadow-[0_4px_15px_rgba(34,197,94,0.4)]'
                    },
                    already_used: {
                        color: 'yellow',
                        borderColor: 'border-yellow-500',
                        iconColor: 'text-yellow-500',
                        glow: 'shadow-[0_0_30px_rgba(234,179,8,0.4)]',
                        icon: <IconAlertTriangle className="w-8 h-8 sm:w-10 sm:h-10" />,
                        title: 'CÓDIGO YA REDIMIDO',
                        subtitle: 'Este código ya encendió el motor anteriormente.',
                        body: 'El obsequio asociado a esta llave ya fue entregado. ¡Sigue disfrutando de Expopartes 2026!',
                        btnClass: 'bg-yellow-600 hover:bg-yellow-700 shadow-[0_4px_15px_rgba(234,179,8,0.4)]'
                    }
                }[type];

                if (!config) return null;

                return (
                    <div className="absolute inset-0 z-50 flex items-center justify-center p-4">
                        <div className="absolute inset-0 bg-black/80 backdrop-blur-sm" onClick={onClose}></div>
                        
                        <div className={`relative w-full max-w-lg bg-[#0e1116] rounded-xl border-t-[6px] ${config.borderColor} shadow-2xl p-6 sm:p-10 flex flex-col items-center text-center animate-[scale-in_0.3s_ease-out]`}>
                           <div className={`w-20 h-20 sm:w-24 sm:h-24 rounded-full border-2 ${config.borderColor} flex items-center justify-center mb-6 sm:mb-8 ${config.glow}`}>
                               <div className={`${config.iconColor}`}>
                                   {config.icon}
                               </div>
                           </div>
                           <h2 className={`text-2xl sm:text-3xl font-black ${config.iconColor} tracking-widest mb-3 uppercase`}>{config.title}</h2>
                           <p className="text-neutral-300 text-sm sm:text-base font-medium mb-6">{config.subtitle}</p>
                           <p className="text-neutral-400 text-xs sm:text-sm leading-relaxed mb-8 sm:mb-10 px-2 sm:px-6">{config.body}</p>
                           
                           <button 
                                onClick={onClose} 
                                className={`w-full py-4 sm:py-5 rounded-lg font-bold text-white text-sm sm:text-base tracking-[0.2em] uppercase transition-all active:scale-95 ${config.btnClass}`}
                            >
                                SIGUIENTE PARTICIPANTE
                           </button>
                        </div>
                    </div>
                );
            };

            // Componente del Panel de Administración
            const AdminPanel = () => {
                return (
                    <div className="absolute inset-0 z-[60] flex items-center justify-center p-4 bg-black/90 backdrop-blur-md animate-[scale-in_0.2s_ease-out]">
                        <div className="bg-neutral-900 border-2 border-neutral-700 rounded-2xl w-full max-w-md p-6 sm:p-8 shadow-2xl text-left">
                            <h2 className="text-2xl font-black text-white mb-6 uppercase tracking-wider flex items-center gap-3">
                                <IconSettings className="text-red-500 w-6 h-6" /> Panel Control
                            </h2>
                            
                            {/* Selector de Días */}
                            <div className="mb-6">
                                <label className="block text-xs font-bold text-neutral-400 mb-3 uppercase tracking-widest">Día Activo del Evento</label>
                                <div className="flex gap-2">
                                    {[0, 1, 2, 3].map(day => (
                                        <button 
                                            key={day}
                                            onClick={() => setActiveDay(day)}
                                            className={`flex-1 py-3 rounded-lg font-bold text-sm transition-colors ${activeDay === day ? 'bg-red-600 text-white shadow-[0_0_15px_rgba(220,38,38,0.4)]' : 'bg-neutral-800 text-neutral-400 hover:bg-neutral-700'}`}
                                        >
                                            {day === 0 ? 'Demo' : `Día ${day}`}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            {/* Mostrar Códigos del Día */}
                            <div className="mb-8 p-4 bg-black rounded-xl border border-neutral-800">
                                <p className="text-xs font-bold text-neutral-500 mb-3 uppercase tracking-widest">Llaves ganadoras ({activeDay === 0 ? 'Demo' : `Día ${activeDay}`})</p>
                                <div className="flex flex-wrap gap-2">
                                    {WINNING_CODES_BY_DAY[activeDay].map(c => (
                                        <span key={c} className={`px-3 py-1.5 rounded text-sm font-mono font-bold tracking-widest border ${usedCodes.includes(c) ? 'bg-neutral-900 border-neutral-700 text-neutral-500 line-through' : 'bg-green-900/20 border-green-500/30 text-green-400'}`}>
                                            {c}
                                        </span>
                                    ))}
                                </div>
                                <p className="text-[10px] text-neutral-500 mt-3">* Los tachados ya fueron reclamados hoy.</p>
                            </div>

                            {/* Botones de acción admin */}
                            <div className="flex flex-col gap-3">
                                <button 
                                    onClick={() => {
                                        if(window.confirm('¿Seguro que deseas borrar el historial de llaves usadas?')) {
                                            setUsedCodes([]); 
                                        }
                                    }}
                                    className="w-full py-3 rounded-lg font-bold text-sm bg-neutral-800 text-red-400 hover:bg-red-900/30 border border-neutral-700 transition-colors"
                                >
                                    BORRAR HISTORIAL DE USO
                                </button>
                                <button 
                                    onClick={() => setShowAdminPanel(false)}
                                    className="w-full py-3 rounded-lg font-bold text-sm bg-white text-black hover:bg-neutral-200 transition-colors uppercase tracking-widest"
                                >
                                    Cerrar Panel
                                </button>
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen bg-neutral-950 flex items-center justify-center p-2 sm:p-6 font-sans selection:bg-red-500/30">
                    <style dangerouslySetInnerHTML={{__html: `
                        @keyframes scale-in {
                            0% { transform: scale(0.9); opacity: 0; }
                            100% { transform: scale(1); opacity: 1; }
                        }
                        .animate-\\[scale-in_0\\.3s_ease-out\\] { animation: scale-in 0.3s ease-out forwards; }
                    `}} />

                    <div className="relative w-full max-w-5xl bg-gradient-to-b from-neutral-800 via-neutral-900 to-black rounded-2xl sm:rounded-[2rem] border-4 sm:border-[12px] border-neutral-700 p-4 sm:p-8 shadow-[0_30px_60px_rgba(0,0,0,0.9),inset_0_5px_20px_rgba(255,255,255,0.1)] overflow-hidden flex flex-col">
                        
                        <div className="absolute top-0 left-0 w-full h-16 bg-gradient-to-b from-black/80 to-transparent z-20 pointer-events-none rounded-t-xl sm:rounded-t-[1.5rem]"></div>
                        <div className="absolute inset-0 opacity-[0.04] bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-white via-transparent to-black bg-[length:4px_4px]"></div>

                        {showModal && <ResultModal type={status} onClose={handleNextParticipant} />}
                        {showAdminPanel && <AdminPanel />}

                        {/* Encabezado Principal */}
                        <div className="relative z-10 flex flex-col sm:flex-row justify-between items-center mb-4 pb-4 gap-4 sm:gap-0">
                            <div className="flex items-center gap-3 w-full sm:w-auto justify-center sm:justify-start">
                                <div 
                                    className="bg-red-600 p-1.5 rounded-md shadow-[0_0_15px_rgba(220,38,38,0.4)] cursor-pointer shrink-0"
                                    onClick={() => {
                                        const newCount = clickCount + 1;
                                        setClickCount(newCount);
                                        if (newCount >= 5) {
                                            setClickCount(0);
                                            setShowAdminPanel(true); // Abre el panel de administración
                                        }
                                    }}
                                    title="Modo Admin: 5 Clics consecutivos para abrir panel"
                                >
                                    <IconSettings className="text-white w-6 h-6" />
                                </div>
                                <h1 className="text-xl sm:text-2xl md:text-3xl font-bold tracking-wider text-white uppercase shadow-black drop-shadow-md text-center sm:text-left leading-tight">
                                    Enciende tu motor <span className="text-red-600 font-black">Cummins</span>
                                </h1>
                            </div>
                            <div className="flex items-center shrink-0">
                                <span className="text-neutral-400 font-bold uppercase tracking-widest text-[10px] sm:text-xs md:text-sm bg-neutral-800/50 px-3 sm:px-4 py-1.5 rounded-sm border-l-4 border-red-600 shadow-inner">
                                    Powered by Cumandes
                                </span>
                            </div>
                        </div>

                        {/* Tira Horizontal de Luces Testigo */}
                        <div className="relative z-10 w-full flex justify-between px-6 sm:px-16 py-3 bg-black/80 border border-neutral-800 rounded-xl mb-6 shadow-inner">
                            <IconBattery className={`w-5 h-5 sm:w-7 sm:h-7 transition-colors ${status === 'idle' || status === 'cranking' ? 'text-red-500 animate-pulse' : 'text-neutral-800'}`} />
                            <IconDroplet className={`w-5 h-5 sm:w-7 sm:h-7 transition-colors ${status === 'idle' || status === 'cranking' ? 'text-red-500' : status === 'success' ? 'text-neutral-800' : 'text-red-500'}`} />
                            <IconActivity className={`w-5 h-5 sm:w-7 sm:h-7 transition-colors ${status === 'cranking' ? 'text-yellow-500 animate-pulse' : 'text-neutral-800'}`} />
                            <IconWrench className={`w-5 h-5 sm:w-7 sm:h-7 transition-colors ${status === 'idle' ? 'text-orange-500' : status === 'cranking' ? 'text-orange-500 animate-pulse' : 'text-neutral-800'}`} />
                            <IconThermometer className={`w-5 h-5 sm:w-7 sm:h-7 transition-colors ${status === 'idle' || status === 'cranking' ? 'text-red-500' : 'text-neutral-800'}`} />
                        </div>

                        {/* Contenido a dos columnas */}
                        <div className="relative z-10 grid grid-cols-1 md:grid-cols-2 gap-6 sm:gap-8 flex-grow">
                            
                            {/* LADO IZQUIERDO: Visualización (Relojes, Código y Mensajes) */}
                            <div className="bg-black/40 p-4 sm:p-6 rounded-2xl border border-neutral-800 shadow-inner flex flex-col items-center justify-between space-y-6 h-full">
                                
                                {/* Relojes (Tacómetro sin líneas decorativas opacas) */}
                                <div className="flex items-end justify-center gap-1 sm:gap-2 w-full mt-2">
                                    <MiniGauge value={temp} rotation={tempRotation} icon={IconThermometer} label="TEMP" color="text-blue-400" />

                                    <div className="relative w-48 h-48 sm:w-60 sm:h-60 flex items-center justify-center mx-0 sm:mx-2 z-10">
                                        <div className="absolute inset-0 rounded-full border-[10px] sm:border-[14px] border-neutral-800 border-b-transparent shadow-[inset_0_0_30px_rgba(0,0,0,1),0_10px_20px_rgba(0,0,0,0.5)] bg-black"></div>
                                        <div className="absolute inset-4 rounded-full border-[4px] sm:border-[6px] border-neutral-700 border-b-transparent"></div>
                                        
                                        <div className="absolute flex flex-col items-center justify-center mt-8 sm:mt-10">
                                            <span className="text-neutral-400 font-mono text-[10px] sm:text-xs font-bold tracking-widest bg-neutral-900 px-2 rounded-full border border-neutral-800">RPM x1000</span>
                                            <span className={`font-mono text-3xl sm:text-4xl font-black mt-1 sm:mt-2 transition-colors duration-300 ${status === 'success' ? 'text-green-500 drop-shadow-[0_0_10px_rgba(34,197,94,0.8)]' : status === 'cranking' ? 'text-yellow-400' : 'text-neutral-600'}`}>
                                                {(rpm / 1000).toFixed(1)}
                                            </span>
                                        </div>

                                        <div 
                                            className="absolute w-2 sm:w-2.5 h-20 sm:h-24 bg-red-600 origin-bottom rounded-t-full shadow-[0_0_15px_rgba(220,38,38,0.6)] transition-transform duration-100 ease-out"
                                            style={{ transform: `rotate(${rpmRotation}deg)`, bottom: '50%' }}
                                        >
                                            <div className="absolute bottom-0 left-1/2 -translate-x-1/2 translate-y-1/2 w-6 h-6 sm:w-8 sm:h-8 bg-neutral-900 border-4 border-neutral-600 rounded-full shadow-lg"></div>
                                        </div>
                                    </div>

                                    <MiniGauge value={oil} rotation={oilRotation} icon={IconDroplet} label="OIL PRESS" color="text-orange-500" />
                                </div>

                                {/* Display del Código Ingresado */}
                                <div className="w-full bg-black border-2 border-neutral-700 rounded-xl p-3 sm:p-4 flex items-center justify-between shadow-[inset_0_4px_10px_rgba(0,0,0,0.8)] h-16 sm:h-20">
                                    <IconKeyRound className={`w-5 h-5 sm:w-6 sm:h-6 ${code.length > 0 ? 'text-red-500' : 'text-neutral-600'}`} />
                                    <span className={`font-mono text-3xl sm:text-4xl tracking-[0.4em] font-bold text-right w-full pr-2 ${status === 'success' ? 'text-green-500' : status === 'fail' ? 'text-red-500' : status === 'already_used' ? 'text-yellow-500' : 'text-white'}`}>
                                        {code.length === 4 ? code : code.padEnd(3, '_')}
                                    </span>
                                </div>

                                {/* Pantalla Central de Mensajes */}
                                <div className="w-full bg-neutral-950 border-2 border-neutral-800 rounded-lg p-2 sm:p-3 shadow-inner flex flex-col items-center justify-center relative overflow-hidden h-16 sm:h-20">
                                    <div className="absolute inset-0 bg-blue-500/5 bg-[linear-gradient(transparent_50%,rgba(0,0,0,0.5)_50%)] bg-[length:100%_4px]"></div>
                                    
                                    {status === 'idle' && (
                                        <div className="text-center z-10">
                                            <p className="text-red-500 font-mono text-[10px] sm:text-xs tracking-[0.2em] mb-1 animate-pulse">ECM BLOQUEADO</p>
                                            <p className="text-neutral-300 font-bold text-sm sm:text-base tracking-wider">INGRESAR CÓDIGO DE LLAVE</p>
                                        </div>
                                    )}
                                    {status === 'cranking' && (
                                        <div className="text-center z-10">
                                            <p className="text-yellow-400 font-mono text-[10px] sm:text-xs tracking-[0.2em] mb-1 animate-pulse">STARTING SEQUENCE...</p>
                                            <p className="text-white font-bold text-sm sm:text-base tracking-wider">LEYENDO PARÁMETROS</p>
                                        </div>
                                    )}
                                    {status === 'success' && (
                                        <div className="text-center z-10 flex items-center gap-3">
                                            <IconCheckCircle2 className="w-5 h-5 sm:w-6 sm:h-6 text-green-500" />
                                            <div>
                                                <p className="text-green-400 font-mono text-[10px] sm:text-xs tracking-[0.2em] mb-0.5">SISTEMA OK</p>
                                                <p className="text-green-500 font-bold text-base sm:text-lg tracking-wider">MOTOR ENCENDIDO</p>
                                            </div>
                                        </div>
                                    )}
                                    {status === 'fail' && (
                                        <div className="text-center z-10">
                                            <p className="text-orange-500 font-mono text-[10px] sm:text-xs tracking-[0.2em] mb-1">INMOVILIZADOR ACTIVO</p>
                                            <p className="text-red-500 font-bold text-sm sm:text-base tracking-wider">LLAVE NO RECONOCIDA</p>
                                        </div>
                                    )}
                                    {status === 'already_used' && (
                                        <div className="text-center z-10">
                                            <p className="text-yellow-500 font-mono text-[10px] sm:text-xs tracking-[0.2em] mb-1">CÓDIGO YA REDIMIDO</p>
                                            <p className="text-orange-500 font-bold text-sm sm:text-base tracking-wider">ESTE CÓDIGO YA SE USÓ</p>
                                        </div>
                                    )}
                                </div>
                            </div>

                            {/* LADO DERECHO: Controles (START y Teclado) */}
                            <div className="bg-neutral-900/50 p-4 sm:p-6 rounded-2xl border border-neutral-800/50 flex flex-col items-center justify-start h-full">
                                
                                {status === 'idle' || status === 'cranking' ? (
                                    <div className="w-full flex flex-col items-center h-full">
                                        
                                        {/* Botón de Arranque */}
                                        <button
                                            onClick={handleStart}
                                            disabled={(code.length !== 3 && code.length !== 4) || status === 'cranking'}
                                            className={`relative group rounded-full p-1.5 transition-transform active:scale-95 disabled:opacity-50 mt-4 mb-8 sm:mb-10 ${
                                                status === 'cranking' ? 'pointer-events-none' : ''
                                            }`}
                                        >
                                            <div className={`absolute inset-0 rounded-full blur-md transition-opacity duration-300 ${
                                                (code.length === 3 || code.length === 4) ? 'bg-red-600/60 opacity-100 animate-pulse' : 'opacity-0'
                                            }`}></div>
                                            <div className="relative bg-gradient-to-b from-red-600 to-red-800 w-28 h-28 sm:w-32 sm:h-32 rounded-full flex flex-col items-center justify-center border-4 border-neutral-900 shadow-[0_8px_15px_rgba(0,0,0,0.6),inset_0_2px_5px_rgba(255,255,255,0.4)]">
                                                <IconPower className={`w-8 h-8 sm:w-10 sm:h-10 mb-1 ${(code.length === 3 || code.length === 4) ? 'text-white drop-shadow-[0_0_8px_rgba(255,255,255,1)]' : 'text-red-950'}`} />
                                                <span className={`font-black text-sm sm:text-base tracking-widest ${(code.length === 3 || code.length === 4) ? 'text-white' : 'text-red-950'}`}>START</span>
                                            </div>
                                        </button>

                                        {/* Teclado Numérico */}
                                        <div className="grid grid-cols-3 gap-3 sm:gap-4 w-full max-w-[260px] sm:max-w-[300px] mb-auto">
                                            {[1, 2, 3, 4, 5, 6, 7, 8, 9].map((num) => (
                                                <button
                                                    key={num}
                                                    onClick={() => handleKeypadPress(num.toString())}
                                                    disabled={isNumDisabled(num.toString())}
                                                    className="bg-neutral-800 hover:bg-neutral-700 active:bg-neutral-600 text-white font-bold text-xl sm:text-2xl py-4 sm:py-6 rounded-lg shadow-[0_4px_0_rgb(23,23,23)] active:shadow-none active:translate-y-1 transition-all disabled:opacity-50"
                                                >
                                                    {num}
                                                </button>
                                            ))}
                                            <button
                                                onClick={handleDelete}
                                                disabled={status !== 'idle' || code.length === 0}
                                                className="bg-neutral-800 hover:bg-neutral-700 text-red-400 font-bold text-lg sm:text-xl py-4 sm:py-6 rounded-lg shadow-[0_4px_0_rgb(23,23,23)] active:shadow-none active:translate-y-1 transition-all disabled:opacity-50"
                                            >
                                                DEL
                                            </button>
                                            <button
                                                onClick={() => handleKeypadPress('0')}
                                                disabled={isNumDisabled('0')}
                                                className="bg-neutral-800 hover:bg-neutral-700 text-white font-bold text-xl sm:text-2xl py-4 sm:py-6 rounded-lg shadow-[0_4px_0_rgb(23,23,23)] active:shadow-none active:translate-y-1 transition-all disabled:opacity-50"
                                            >
                                                0
                                            </button>
                                            <button
                                                onClick={handleRandomCode}
                                                disabled={status !== 'idle'}
                                                className="bg-neutral-800 hover:bg-neutral-700 text-blue-400 font-bold py-4 sm:py-6 rounded-lg shadow-[0_4px_0_rgb(23,23,23)] active:shadow-none active:translate-y-1 transition-all disabled:opacity-50 flex items-center justify-center"
                                                title="Número Aleatorio"
                                            >
                                                <IconDices className="w-6 h-6 sm:w-7 sm:h-7" />
                                            </button>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="w-full flex flex-col items-center justify-center h-full">
                                        <button 
                                            onClick={handleReset}
                                            className="flex items-center justify-center gap-2 w-full max-w-[260px] sm:max-w-[300px] bg-neutral-800 hover:bg-neutral-700 text-white py-5 sm:py-6 rounded-xl font-bold transition-colors border border-neutral-600 shadow-[0_4px_0_rgb(23,23,23)] active:shadow-none active:translate-y-1 text-sm sm:text-base tracking-widest uppercase"
                                        >
                                            <IconRefreshCcw className="w-5 h-5 sm:w-6 sm:h-6" /> REINICIAR PANEL
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SimuladorApp />);
    </script>
</body>
</html>
